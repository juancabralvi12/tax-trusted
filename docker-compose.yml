services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tax_trusted
      POSTGRES_USER: tax_trusted
      POSTGRES_PASSWORD: tax_trusted
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tax_trusted -d tax_trusted"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tax_trusted
      SPRING_DATASOURCE_USERNAME: tax_trusted
      SPRING_DATASOURCE_PASSWORD: tax_trusted
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./web
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres-data:

