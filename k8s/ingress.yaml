apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tax-trusted
  namespace: tax-trusted
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    nginx.ingress.kubernetes.io/rate-limit: "120"
spec:
  ingressClassName: nginx
  rules:
    - host: tax-trusted.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: tax-trusted-api
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tax-trusted-web
                port:
                  number: 80

