apiVersion: apps/v1
kind: Deployment
metadata:
  name: tax-trusted-api
  namespace: tax-trusted
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tax-trusted-api
  template:
    metadata:
      labels:
        app: tax-trusted-api
    spec:
      containers:
        - name: api
          image: tax-trusted-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: tax-trusted-config
            - secretRef:
                name: tax-trusted-secret
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: tax-trusted-api
  namespace: tax-trusted
spec:
  selector:
    app: tax-trusted-api
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tax-trusted-api
  namespace: tax-trusted
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tax-trusted-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65

